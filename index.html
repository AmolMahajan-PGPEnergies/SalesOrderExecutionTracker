<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Everyone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        :root {
            --brand-bg: #0b0d10;
            --brand-bg-deep: #050607;
            --brand-panel: #14181d;
            --brand-border: #2b3138;
            --brand-text: #e6edf4;
            --brand-muted: #9ea9b5;
            --brand-accent: #16c2c5;
            --brand-accent-strong: #0aa4a8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @keyframes waveFlow {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }
        body {
            display: flex;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 16%, rgba(255, 255, 255, 0.03) 0%, transparent 34%),
                linear-gradient(165deg,
                var(--brand-bg-deep) 0%,
                var(--brand-bg) 40%,
                #171c22 100%);
            background-size: 200% 200%;
            font-family: 'Poppins', sans-serif;
            animation: waveFlow 8s ease-in-out infinite;
            color: var(--brand-text);
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: rgba(10, 12, 15, 0.95);
            padding: 12px 24px;
            border-bottom: 1px solid var(--brand-border);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            height: 70px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-logo {
            display: block;
            height: auto;
            width: 175px;
            border-radius: 6px;
        }
        header h1 {
            color: var(--brand-accent);
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }
        .sidebar-toggle {
            background: none;
            border: 1px solid var(--brand-border);
            color: var(--brand-text);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }
        .sidebar-toggle:hover {
            background-color: rgba(22, 194, 197, 0.1);
            border-color: var(--brand-accent);
        }
        .header-logo-link {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 260px;
            height: calc(100vh - 70px);
            background-color: rgba(11, 13, 16, 0.85);
            border-right: 1px solid var(--brand-border);
            backdrop-filter: blur(8px);
            overflow-y: auto;
            padding: 20px 0;
            transition: width 0.3s ease;
        }
        .sidebar.collapsed {
            width: 60px;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu-item {
            padding: 0;
        }
        .sidebar-menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--brand-muted);
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .sidebar-menu-link:hover {
            color: var(--brand-accent);
            background-color: rgba(22, 194, 197, 0.08);
            border-left-color: var(--brand-accent);
        }
        .sidebar-menu-link.active {
            color: var(--brand-accent);
            background-color: rgba(22, 194, 197, 0.12);
            border-left-color: var(--brand-accent);
        }
        .header-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .header-buttons button {
            border: 1px solid var(--brand-border);
            background-color: rgba(19, 24, 31, 0.9);
            color: var(--brand-text);
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .header-buttons button:hover {
            background-color: rgba(22, 194, 197, 0.16);
            transform: translateY(-1px);
        }
        .color-picker {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            display: none;
            grid-template-columns: repeat(4, 34px);
            gap: 8px;
            background: rgba(15, 20, 26, 0.95);
            border: 1px solid var(--brand-border);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.36);
            z-index: 1000;
        }
        .color-picker.show {
            display: grid;
        }
        .color-option {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid rgba(230, 243, 242, 0.85);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .color-option:hover {
            transform: scale(1.08);
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 100%;
                height: auto;
                top: 70px;
                border-right: none;
                border-bottom: 1px solid var(--brand-border);
                padding: 10px 0;
            }
            .sidebar.collapsed {
                width: 100%;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
            }
            .sidebar-menu-item {
                flex: 1 1 auto;
            }
            .sidebar-menu-link {
                padding: 8px 12px;
                font-size: 0.85em;
                white-space: nowrap;
            }
            main {
                margin-left: 0;
                margin-top: calc(70px + 50px);
                padding: 20px 12px;
            }
            body.sidebar-collapsed main {
                margin-left: 0;
            }
            main h1 {
                font-size: 1.8em;
            }
            .header-actions {
                display: none;
            }
            .color-picker {
                right: 50%;
                transform: translateX(50%);
            }
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-left: 260px;
            margin-top: 70px;
            padding: 32px 24px;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }
        body.sidebar-collapsed main {
            margin-left: 60px;
        }
        main h1 {
            color: var(--brand-accent);
            font-size: 3em;
            text-shadow: none;
        }
        main p {
            color: var(--brand-text);
            font-size: 1.2em;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            max-width: 600px;
            text-shadow: none;
            line-height: 1.6;
            background-color: rgba(20, 25, 32, 0.84);
            border: 1px solid var(--brand-border);
            border-radius: 14px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
        }
        .repositories {
            margin-top: 40px;
            text-align: center;
        }
        .repositories h2 {
            color: var(--brand-accent);
            font-size: 2em;
            text-shadow: none;
            margin-bottom: 20px;
        }
        .repositories ul {
            list-style: none;
            color: var(--brand-text);
            font-size: 1.1em;
        }
        .repositories li {
            padding: 10px 20px;
            margin: 8px;
            background-color: rgba(20, 25, 32, 0.84);
            border: 1px solid var(--brand-border);
            border-radius: 999px;
            display: inline-block;
            text-shadow: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .repositories li:hover {
            background-color: rgba(22, 194, 197, 0.16);
            transform: translateY(-1px);
        }
        .repositories li a {
            color: var(--brand-text);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .repositories li a:hover {
            color: #d9ffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <a href="index.html" aria-label="PGP Energies home">
                <img class="brand-logo" src="PGP Energies - Full logo - Main.png" alt="PGP Energies logo">
            </a>
            <h1>COREPULSE</h1>
        </div>
        <div class="header-actions">
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            <button id="rainbowButton" type="button">Gradient</button>
            <button id="colorsButton" type="button">Shades</button>
            <div id="colorPicker" class="color-picker" aria-label="Background color options">
                <button type="button" class="color-option" data-color="#031f20" title="Midnight Teal" style="background:#031f20"></button>
                <button type="button" class="color-option" data-color="#052f31" title="Deep Teal" style="background:#052f31"></button>
                <button type="button" class="color-option" data-color="#074245" title="Ocean Teal" style="background:#074245"></button>
                <button type="button" class="color-option" data-color="#0b3a3c" title="Panel Teal" style="background:#0b3a3c"></button>
                <button type="button" class="color-option" data-color="#11494b" title="Muted Teal" style="background:#11494b"></button>
                <button type="button" class="color-option" data-color="#0a5659" title="Sea Teal" style="background:#0a5659"></button>
                <button type="button" class="color-option" data-color="#0f6f72" title="Turquoise Deep" style="background:#0f6f72"></button>
                <button type="button" class="color-option" data-color="#0aa4a8" title="Cyan Accent" style="background:#0aa4a8"></button>
                <button type="button" class="color-option" data-color="#16c2c5" title="Bright Cyan" style="background:#16c2c5"></button>
                <button type="button" class="color-option" data-color="#0e7490" title="Slate Cyan" style="background:#0e7490"></button>
                <button type="button" class="color-option" data-color="#1f2937" title="Graphite" style="background:#1f2937"></button>
                <button type="button" class="color-option" data-color="#111827" title="Charcoal" style="background:#111827"></button>
            </div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a href="index.html" class="sidebar-menu-link active">📊 Dashboard</a>
            </li>
            <li class="sidebar-menu-item">
                <a href="SalesOrderTracker.html" class="sidebar-menu-link">🚀 Projects</a>
            </li>
            <li class="sidebar-menu-item">
                <a href="SalesOrderTrackerAndExecutionControls.html" class="sidebar-menu-link">👥 My Team</a>
            </li>
        </nav>
    </aside>

    <main>
        <h1>Welcome to COREPULSE</h1>
        <p>PGP Energies Sales Order & Execution Tracking System
            <br>
            Manage your shipments and execution workflows efficiently.
        </p>
        <div class="repositories">
            <h2>My Projects</h2>
            <ul>
                <li><a href="SalesOrderTracker.html">Sales Order Tracker</a></li>
                <li><a href="SalesOrderTrackerAndExecutionControls.html">Execution Controls</a></li>
            </ul>
        </div>
    </main>
    <script>
        const body = document.body;
        const colorsButton = document.getElementById('colorsButton');
        const rainbowButton = document.getElementById('rainbowButton');
        const colorPicker = document.getElementById('colorPicker');
        const colorOptions = document.querySelectorAll('.color-option');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');
        const originalRainbow = 'radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.05) 0%, transparent 30%), radial-gradient(circle at 90% 16%, rgba(255, 255, 255, 0.03) 0%, transparent 34%), linear-gradient(165deg, #050607 0%, #0b0d10 40%, #171c22 100%)';

        function setSolidBackground(color) {
            body.style.animation = 'none';
            body.style.backgroundImage = 'none';
            body.style.backgroundColor = color;
        }

        function setRainbowBackground() {
            body.style.background = originalRainbow;
            body.style.backgroundSize = '200% 200%';
            body.style.backgroundPosition = '0% 0%';
            body.style.animation = 'waveFlow 8s ease-in-out infinite';
        }

        colorsButton.addEventListener('click', function () {
            colorPicker.classList.toggle('show');
        });

        rainbowButton.addEventListener('click', function () {
            colorPicker.classList.remove('show');
            setRainbowBackground();
        });

        colorOptions.forEach(function (option) {
            option.addEventListener('click', function () {
                const selectedColor = option.getAttribute('data-color');
                setSolidBackground(selectedColor);
                colorPicker.classList.remove('show');
            });
        });

        document.addEventListener('click', function (event) {
            if (!colorPicker.contains(event.target) && event.target !== colorsButton) {
                colorPicker.classList.remove('show');
            }
        });

        sidebarToggle.addEventListener('click', function () {
            sidebar.classList.toggle('collapsed');
            body.classList.toggle('sidebar-collapsed');
        });
    </script>
