<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Everyone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        :root {
            --brand-bg: #0b0d10;
            --brand-bg-deep: #050607;
            --brand-panel: #14181d;
            --brand-border: #2b3138;
            --brand-text: #e6edf4;
            --brand-muted: #9ea9b5;
            --brand-accent: #16c2c5;
            --brand-accent-strong: #0aa4a8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @keyframes waveFlow {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }
        body {
            display: flex;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 16%, rgba(255, 255, 255, 0.03) 0%, transparent 34%),
                linear-gradient(165deg,
                var(--brand-bg-deep) 0%,
                var(--brand-bg) 40%,
                #171c22 100%);
            background-size: 200% 200%;
            font-family: 'Poppins', sans-serif;
            animation: waveFlow 8s ease-in-out infinite;
            color: var(--brand-text);
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: rgba(10, 12, 15, 0.95);
            padding: 12px 24px;
            border-bottom: 1px solid var(--brand-border);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            height: 70px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-logo {
            display: block;
            height: auto;
            width: 175px;
            border-radius: 6px;
        }
        header h1 {
            color: var(--brand-accent);
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .sidebar-toggle {
            background: none;
            border: 1px solid var(--brand-border);
            color: var(--brand-text);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }
        .sidebar-toggle:hover {
            background-color: rgba(22, 194, 197, 0.1);
            border-color: var(--brand-accent);
        }
        .header-logo-link {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 260px;
            height: calc(100vh - 70px);
            background-color: rgba(11, 13, 16, 0.85);
            border-right: 1px solid var(--brand-border);
            backdrop-filter: blur(8px);
            overflow-y: auto;
            padding: 20px 0;
            transition: width 0.3s ease;
        }
        .sidebar.collapsed {
            width: 60px;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu-item {
            padding: 0;
        }
        .sidebar-menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--brand-muted);
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .sidebar-menu-link:hover {
            color: var(--brand-accent);
            background-color: rgba(22, 194, 197, 0.08);
            border-left-color: var(--brand-accent);
        }
        .sidebar-menu-link.active {
            color: var(--brand-accent);
            background-color: rgba(22, 194, 197, 0.12);
            border-left-color: var(--brand-accent);
        }
        .sidebar.collapsed .sidebar-menu-link {
            padding: 12px 8px;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: all 0.2s ease;
        }
        .sidebar.collapsed .sidebar-menu-link span {
            display: none;
        }
        .sidebar.collapsed .sidebar-menu-link:hover {
            padding: 12px 20px;
            justify-content: flex-start;
            background-color: rgba(22, 194, 197, 0.08);
            border-radius: 6px;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transform: translateX(10px);
        }
        .sidebar.collapsed .sidebar-menu-link:hover span {
            display: inline;
        }
        .sidebar-menu-link {
            position: relative;
        }
        .header-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .header-buttons button {
            border: 1px solid var(--brand-border);
            background-color: rgba(19, 24, 31, 0.9);
            color: var(--brand-text);
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .header-buttons button:hover {
            background-color: rgba(22, 194, 197, 0.16);
            transform: translateY(-1px);
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 100%;
                height: auto;
                top: 70px;
                border-right: none;
                border-bottom: 1px solid var(--brand-border);
                padding: 10px 0;
            }
            .sidebar.collapsed {
                width: 100%;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
            }
            .sidebar-menu-item {
                flex: 1 1 auto;
            }
            .sidebar-menu-link {
                padding: 8px 12px;
                font-size: 0.85em;
                white-space: nowrap;
            }
            main {
                margin-left: 0;
                margin-top: calc(70px + 50px);
                padding: 20px 12px;
            }
            body.sidebar-collapsed main {
                margin-left: 0;
            }
            main h1 {
                font-size: 1.8em;
            }

        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-left: 260px;
            margin-top: 70px;
            padding: 32px 24px;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }
        body.sidebar-collapsed main {
            margin-left: 60px;
        }
        main h1 {
            color: var(--brand-accent);
            font-size: 3em;
            text-shadow: none;
        }
        main p {
            color: var(--brand-text);
            font-size: 1.2em;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            max-width: 600px;
            text-shadow: none;
            line-height: 1.6;
            background-color: rgba(20, 25, 32, 0.84);
            border: 1px solid var(--brand-border);
            border-radius: 14px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
        }
        .repositories {
            margin-top: 40px;
            text-align: center;
        }
        .repositories h2 {
            color: var(--brand-accent);
            font-size: 2em;
            text-shadow: none;
            margin-bottom: 20px;
        }
        .repositories ul {
            list-style: none;
            color: var(--brand-text);
            font-size: 1.1em;
        }
        .repositories li {
            padding: 10px 20px;
            margin: 8px;
            background-color: rgba(20, 25, 32, 0.84);
            border: 1px solid var(--brand-border);
            border-radius: 999px;
            display: inline-block;
            text-shadow: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .repositories li:hover {
            background-color: rgba(22, 194, 197, 0.16);
            transform: translateY(-1px);
        }
        .repositories li a {
            color: var(--brand-text);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .repositories li a:hover {
            color: #d9ffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <a href="index.html" aria-label="PGP Energies home">
                <img class="brand-logo" src="PGP Energies - Full logo - Main.png" alt="PGP Energies logo">
            </a>
            <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
            <h1>COREPULSE</h1>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a href="index.html" class="sidebar-menu-link active">📊 <span>Dashboard</span></a>
            </li>
            <li class="sidebar-menu-item">
                <a href="SalesOrderTracker.html" class="sidebar-menu-link">🚀 <span>Projects</span></a>
            </li>
            <li class="sidebar-menu-item">
                <a href="SalesOrderTrackerAndExecutionControls.html" class="sidebar-menu-link">👥 <span>My Team</span></a>
            </li>
        </nav>
    </aside>

    <main>
        <h1>Welcome to COREPULSE</h1>
        <p>PGP Energies Sales Order & Execution Tracking System
            <br>
            Manage your shipments and execution workflows efficiently.
        </p>
        <div class="repositories">
            <h2>My Projects</h2>
            <ul>
                <li><a href="SalesOrderTracker.html">Sales Order Tracker</a></li>
                <li><a href="SalesOrderTrackerAndExecutionControls.html">Execution Controls</a></li>
            </ul>
        </div>
    </main>
    <script>
        const body = document.body;
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');

        sidebarToggle.addEventListener('click', function () {
            sidebar.classList.toggle('collapsed');
            body.classList.toggle('sidebar-collapsed');
        });
    </script>

</html>
